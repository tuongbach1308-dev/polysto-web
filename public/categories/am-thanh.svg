<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90" fill="none">
  <!-- Left earbud stem -->
  <rect x="32" y="35" width="5" height="28" rx="2.5" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <!-- Left earbud head -->
  <ellipse cx="34.5" cy="30" rx="10" ry="12" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <ellipse cx="34.5" cy="28" rx="4" ry="4.5" fill="#d1d5db"/>
  <!-- Right earbud stem -->
  <rect x="63" y="35" width="5" height="28" rx="2.5" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <!-- Right earbud head -->
  <ellipse cx="65.5" cy="30" rx="10" ry="12" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <ellipse cx="65.5" cy="28" rx="4" ry="4.5" fill="#d1d5db"/>
</svg>
